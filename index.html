<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QA Testing Board · ABC Insights</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #070b14;
      --bg-2: #0c1220;
      --sidebar: #0a1020;
      --panel: #111827;
      --panel-2: #151d2e;
      --line: #243044;
      --text: #f3f6fb;
      --muted: #9aa8bf;
      --blue: #3b82f6;
      --blue-2: #2563eb;
      --blue-soft: rgba(59, 130, 246, 0.16);
      --blue-glow: rgba(59, 130, 246, 0.35);
      --ok: #34d399;
      --warn: #fbbf24;
      --radius: 14px;
      --font: Inter, system-ui, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: 64px 1fr;
    }

    /* Header */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      background: linear-gradient(90deg, #0a1428, #0d1a33 50%, #0a1428);
      border-bottom: 1px solid var(--line);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand-mark {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-text strong {
      display: block;
      font-size: 13px;
      letter-spacing: 0.06em;
      font-weight: 800;
    }

    .brand-text span {
      display: block;
      font-size: 11px;
      color: var(--muted);
    }

    .brand-divider {
      width: 1px;
      height: 28px;
      background: var(--line);
      margin: 0 4px;
    }

    .product strong {
      display: block;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    .product span {
      display: block;
      font-size: 11px;
      color: #7dd3fc;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .qa-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 999px;
      background: var(--blue-soft);
      border: 1px solid rgba(59, 130, 246, 0.35);
      color: #93c5fd;
      font-size: 12px;
      font-weight: 700;
    }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: var(--blue-2);
      color: white;
      font-size: 12px;
      font-weight: 800;
    }

    .avatar.ghost {
      background: transparent;
      border: 1px solid var(--line);
      color: var(--muted);
    }

    /* Body */
    .shell {
      display: grid;
      grid-template-columns: 270px 1fr;
      min-height: calc(100vh - 64px);
    }

    /* Sidebar */
    .sidebar {
      background: var(--sidebar);
      border-right: 1px solid var(--line);
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      overflow-y: auto;
    }

    .nav-home {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      border: none;
      background: transparent;
      color: var(--text);
      font: inherit;
      font-size: 14px;
      font-weight: 600;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      text-align: left;
    }

    .nav-home:hover,
    .nav-item:hover { background: rgba(255,255,255,0.04); }

    .nav-home.active,
    .nav-item.active {
      background: var(--blue);
      color: white;
      box-shadow: 0 0 0 1px rgba(147, 197, 253, 0.25);
    }

    .nav-section {
      margin-top: 12px;
      padding: 0 10px 6px;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #60a5fa;
      font-weight: 700;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      border: none;
      background: transparent;
      color: var(--text);
      font: inherit;
      font-size: 13.5px;
      font-weight: 600;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      text-align: left;
    }

    .nav-item .spacer { flex: 1; }
    .nav-item .chev {
      color: var(--muted);
      font-size: 12px;
      transition: transform 0.15s ease;
    }
    .nav-item.open .chev { transform: rotate(180deg); }

    .nav-child {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      border: none;
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-size: 13px;
      font-weight: 500;
      padding: 8px 12px 8px 38px;
      border-radius: 10px;
      cursor: pointer;
      text-align: left;
    }

    .nav-child:hover { color: var(--text); background: rgba(255,255,255,0.03); }
    .nav-child.active {
      color: white;
      background: var(--blue-soft);
      border: 1px solid rgba(59, 130, 246, 0.25);
    }

    .whats-new {
      margin-top: auto;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
    }

    .whats-new .label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.1em;
      color: #93c5fd;
      margin-bottom: 6px;
    }

    .whats-new p {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.45;
    }

    /* Main */
    .main {
      background:
        radial-gradient(900px 400px at 80% -10%, rgba(37, 99, 235, 0.18), transparent 55%),
        var(--bg-2);
      padding: 22px;
      overflow: auto;
    }

    .main.embed {
      padding: 0;
      overflow: hidden;
    }

    .hero {
      position: relative;
      overflow: hidden;
      border-radius: 18px;
      padding: 28px;
      background:
        radial-gradient(500px 220px at 85% 20%, rgba(59, 130, 246, 0.35), transparent 60%),
        linear-gradient(135deg, #101b33, #0d1730 55%, #122445);
      border: 1px solid rgba(59, 130, 246, 0.25);
      min-height: 168px;
      display: grid;
      grid-template-columns: 1.4fr 0.8fr;
      gap: 16px;
      align-items: center;
    }

    .hero-kicker {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #93c5fd;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .hero h1 {
      font-size: clamp(1.6rem, 2.4vw, 2.1rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    .hero p {
      color: var(--muted);
      max-width: 48ch;
      line-height: 1.5;
      font-size: 14px;
    }

    .hero-badge {
      position: absolute;
      top: 16px;
      right: 16px;
      font-size: 11px;
      font-weight: 700;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(251, 191, 36, 0.12);
      color: var(--warn);
      border: 1px solid rgba(251, 191, 36, 0.3);
    }

    .hero-badge.ready {
      background: rgba(52, 211, 153, 0.12);
      color: var(--ok);
      border-color: rgba(52, 211, 153, 0.3);
    }

    .hero-art {
      justify-self: end;
      width: 150px;
      height: 120px;
      border-radius: 16px;
      background: linear-gradient(160deg, rgba(59,130,246,0.35), rgba(15,23,42,0.9));
      border: 1px solid rgba(147, 197, 253, 0.25);
      display: grid;
      place-items: center;
      position: relative;
    }

    .hero-art::after {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: 10px;
      background:
        linear-gradient(#93c5fd, #93c5fd) 20% 70% / 12% 28% no-repeat,
        linear-gradient(#60a5fa, #60a5fa) 40% 55% / 12% 42% no-repeat,
        linear-gradient(#3b82f6, #3b82f6) 60% 45% / 12% 52% no-repeat,
        radial-gradient(circle at 78% 38%, #bfdbfe 0 8px, transparent 9px),
        linear-gradient(180deg, rgba(255,255,255,0.12), transparent);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .section-title {
      margin: 22px 0 12px;
      font-size: 16px;
      font-weight: 700;
    }

    .cards { display: grid; gap: 10px; }

    .report-card {
      display: grid;
      grid-template-columns: 48px 1fr auto;
      gap: 14px;
      align-items: center;
      padding: 14px 16px;
      border-radius: 14px;
      background: var(--panel);
      border: 1px solid var(--line);
    }

    .report-card:hover {
      border-color: rgba(59, 130, 246, 0.45);
      background: var(--panel-2);
    }

    .report-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: var(--blue-soft);
      color: #93c5fd;
      border: 1px solid rgba(59, 130, 246, 0.25);
    }

    .report-card h3 {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 3px;
    }

    .report-card p {
      font-size: 12.5px;
      color: var(--muted);
    }

    .btn {
      border: none;
      cursor: pointer;
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      border-radius: 10px;
      padding: 10px 14px;
      background: var(--blue);
      color: white;
      white-space: nowrap;
    }

    .btn:hover { background: var(--blue-2); }

    .info-bar {
      margin-top: 18px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(15, 23, 42, 0.65);
      color: var(--muted);
      font-size: 12.5px;
      line-height: 1.45;
    }

    .info-bar .i {
      width: 18px;
      height: 18px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: var(--blue-soft);
      color: #93c5fd;
      font-size: 11px;
      font-weight: 800;
      flex: 0 0 auto;
    }

    .embed-frame {
      width: 100%;
      height: calc(100vh - 64px);
      border: 0;
      background: #0f1419;
      display: block;
    }

    .hidden { display: none !important; }

    @media (max-width: 960px) {
      .shell { grid-template-columns: 1fr; }
      .sidebar { border-right: none; border-bottom: 1px solid var(--line); max-height: 280px; }
      .hero { grid-template-columns: 1fr; }
      .hero-art { display: none; }
      .report-card { grid-template-columns: 48px 1fr; }
      .report-card .btn { grid-column: 2; justify-self: start; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">
          <svg width="36" height="28" viewBox="0 0 72 52" fill="none" aria-hidden="true">
            <path d="M8 38C18 10 30 2 42 8c8 4 12 14 13 22" stroke="#fff" stroke-width="4.5" stroke-linecap="round"/>
            <path d="M20 40c8-18 18-28 30-22 8 4 12 14 13 22" stroke="#93c5fd" stroke-width="4.5" stroke-linecap="round" opacity="0.95"/>
            <path d="M34 40c6-15 14-22 24-17 7 3.5 10 11 11 17" stroke="#60a5fa" stroke-width="4.5" stroke-linecap="round" opacity="0.85"/>
          </svg>
          <div class="brand-text">
            <strong>ABC FITNESS</strong>
            <span>Join the Movement</span>
          </div>
        </div>
        <div class="brand-divider"></div>
        <div class="product">
          <strong>QA TESTING BOARD</strong>
          <span>ABC Insights · QA Environment</span>
        </div>
      </div>
      <div class="top-actions">
        <div class="qa-pill">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 3l7 3v5c0 5-3 8-7 10-4-2-7-5-7-10V6l7-3z" stroke="currentColor" stroke-width="1.8"/></svg>
          QA
        </div>
        <div class="avatar">QA</div>
        <div class="avatar ghost" aria-hidden="true">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="3.5" stroke="currentColor" stroke-width="1.7"/><path d="M5 19c1.5-3.5 4-5 7-5s5.5 1.5 7 5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
        </div>
      </div>
    </header>

    <div class="shell">
      <aside class="sidebar">
        <button class="nav-home" data-page="home" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 11l8-7 8 7v8a2 2 0 0 1-2 2h-4v-6H10v6H6a2 2 0 0 1-2-2v-8z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg>
          Home
        </button>

        <div class="nav-section">Insight Reports</div>
        <button class="nav-item" data-toggle="insight" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M14 2H7a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z" stroke="currentColor" stroke-width="1.7"/><path d="M14 2v6h6M9 13h6M9 17h4" stroke="currentColor" stroke-width="1.7"/></svg>
          Insight Reports
          <span class="spacer"></span>
          <span class="chev">▾</span>
        </button>
        <div class="nav-group" id="group-insight">
          <button class="nav-child" data-page="insight-reports" type="button">Insight Reports</button>
        </div>

        <div class="nav-section">Dashboards</div>
        <button class="nav-item open" data-toggle="dashboards" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="7" rx="1.2" stroke="currentColor" stroke-width="1.7"/><rect x="14" y="3" width="7" height="7" rx="1.2" stroke="currentColor" stroke-width="1.7"/><rect x="3" y="14" width="7" height="7" rx="1.2" stroke="currentColor" stroke-width="1.7"/><rect x="14" y="14" width="7" height="7" rx="1.2" stroke="currentColor" stroke-width="1.7"/></svg>
          Dashboards
          <span class="spacer"></span>
          <span class="chev">▾</span>
        </button>
        <div class="nav-group" id="group-dashboards">
          <button class="nav-child" data-page="daily-deposit" type="button">Daily Deposit Analysis (Ignite)</button>
          <button class="nav-child" data-page="new-joins" type="button">New Joins Analysis</button>
        </div>

        <div class="nav-section">EOM Reports</div>
        <button class="nav-item open" data-toggle="eom" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="15" rx="2" stroke="currentColor" stroke-width="1.7"/><path d="M3 10h18M9 5v15" stroke="currentColor" stroke-width="1.7"/></svg>
          EOM reports
          <span class="spacer"></span>
          <span class="chev">▾</span>
        </button>
        <div class="nav-group" id="group-eom">
          <button class="nav-child" data-page="eft-allocation" type="button">EFT Allocation</button>
          <button class="nav-child" data-page="eft-annual" type="button">EFT Allocation Annual</button>
          <button class="nav-child" data-page="accounting-journal" type="button">Accounting Journal Entries</button>
        </div>

        <div class="nav-section">PF Reports</div>
        <button class="nav-item open" data-toggle="pf" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 20V5M4 20h16M8 16v-5M12 16V8M16 16v-3" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
          PF reports
          <span class="spacer"></span>
          <span class="chev">▾</span>
        </button>
        <div class="nav-group" id="group-pf">
          <button class="nav-child" data-page="drdr" type="button">DRDR</button>
        </div>

        <div class="whats-new">
          <div class="label">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M4 10v4h2l5 4V6L6 10H4zm13.5 2a3.5 3.5 0 0 0-1.5-2.9M19 7a7 7 0 0 1 0 10" stroke="#93c5fd" stroke-width="1.7" stroke-linecap="round"/></svg>
            WHAT'S NEW
          </div>
          <p>Expand sections as new QA logic is added.</p>
        </div>
      </aside>

      <main class="main" id="main">
        <!-- filled by JS -->
      </main>
    </div>
  </div>

  <script>
    const PAGES = {
      home: {
        kicker: "HOME",
        title: "QA Environment",
        desc: "Use the left panel to open Insight Reports, Dashboards, EOM reports, and PF reports for validation.",
        ready: true,
        cards: [
          { id: "daily-deposit", title: "Daily Deposit Analysis (Ignite)", desc: "Settlement balance mismatch check with upload, month filter, and export." },
          { id: "drdr", title: "DRDR", desc: "PF report module placeholder for upcoming QA validation." },
        ],
      },
      "insight-reports": {
        kicker: "INSIGHT REPORTS",
        title: "Insight Reports",
        desc: "Insight report group. More modules will be added as QA scope expands.",
        cards: [],
      },
      dashboards: {
        kicker: "DASHBOARDS",
        title: "Dashboards",
        desc: "Open a dashboard from the left panel to begin testing.",
        cards: [
          { id: "daily-deposit", title: "Daily Deposit Analysis (Ignite)", desc: "Settlement balance reconciliation QA dashboard." },
          { id: "new-joins", title: "New Joins Analysis", desc: "New joins dashboard placeholder for upcoming logic." },
        ],
      },
      "daily-deposit": { embed: "daily-deposit.html" },
      "new-joins": {
        kicker: "DASHBOARDS",
        title: "New Joins Analysis",
        desc: "Placeholder dashboard — New Joins analysis logic will be added later.",
        cards: [],
      },
      "eom-reports": {
        kicker: "EOM REPORTS",
        title: "EOM reports",
        desc: "End-of-month report group. Open a child report from the left panel.",
        cards: [
          { id: "eft-allocation", title: "EFT Allocation", desc: "Combined Summary match check — same validations as Annual, plus club-level Gross Invoice gaps." },
          { id: "eft-annual", title: "EFT Allocation Annual", desc: "Combined Summary match check — Gross Invoices, Delinquent Recovery, Total Collected in Cycle." },
          { id: "accounting-journal", title: "Accounting Journal Entries", desc: "Accounting Journal Entries report testing module." },
        ],
      },
      "eft-allocation": { embed: "eft-allocation.html" },
      "eft-annual": { embed: "eft-allocation-annual.html" },
      "accounting-journal": {
        kicker: "EOM REPORTS",
        title: "Accounting Journal Entries",
        desc: "Placeholder — Accounting Journal Entries report testing module.",
        cards: [],
      },
      "pf-reports": {
        kicker: "PF REPORTS",
        title: "PF reports",
        desc: "PF report group. Open DRDR from the left panel.",
        cards: [
          { id: "drdr", title: "DRDR", desc: "PF report for detailed deposit and reconciliation." },
        ],
      },
      drdr: {
        kicker: "PF REPORTS",
        title: "DRDR",
        desc: "Placeholder — DRDR report testing module.",
        cards: [],
      },
    };

    const main = document.getElementById("main");
    let current = "pf-reports";

    function setActiveNav(page) {
      document.querySelectorAll(".nav-home, .nav-child, .nav-item").forEach((el) => el.classList.remove("active"));
      const child = document.querySelector(`.nav-child[data-page="${page}"]`);
      if (child) child.classList.add("active");
      if (page === "home") document.querySelector('.nav-home[data-page="home"]').classList.add("active");

      // highlight parent groups loosely
      if (["daily-deposit", "new-joins", "dashboards"].includes(page)) {
        document.querySelector('[data-toggle="dashboards"]').classList.add("active");
      }
      if (["eft-allocation", "eft-annual", "accounting-journal", "eom-reports"].includes(page)) {
        document.querySelector('[data-toggle="eom"]').classList.add("active");
      }
      if (["drdr", "pf-reports"].includes(page)) {
        document.querySelector('[data-toggle="pf"]').classList.add("active");
      }
      if (["insight-reports"].includes(page)) {
        document.querySelector('[data-toggle="insight"]').classList.add("active");
      }
    }

    function renderPage(page) {
      current = page;
      const cfg = PAGES[page] || PAGES.home;
      setActiveNav(page);
      history.replaceState(null, "", `#${page}`);

      if (cfg.embed) {
        main.classList.add("embed");
        main.innerHTML = `<iframe class="embed-frame" title="Daily Deposit Analysis" src="${cfg.embed}"></iframe>`;
        return;
      }

      main.classList.remove("embed");
      const ready = !!cfg.ready || page === "daily-deposit";
      const badge = ready
        ? `<div class="hero-badge ready">Ready for QA</div>`
        : `<div class="hero-badge">Coming soon</div>`;

      const cards = (cfg.cards || [])
        .map(
          (c) => `
        <div class="report-card">
          <div class="report-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M14 2H7a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z" stroke="currentColor" stroke-width="1.7"/><path d="M14 2v6h6M9 13h6M9 17h4" stroke="currentColor" stroke-width="1.7"/></svg>
          </div>
          <div>
            <h3>${c.title}</h3>
            <p>${c.desc}</p>
          </div>
          <button class="btn" type="button" data-open="${c.id}">Open Report ›</button>
        </div>`
        )
        .join("");

      main.innerHTML = `
        <section class="hero">
          ${badge}
          <div>
            <div class="hero-kicker">${cfg.kicker}</div>
            <h1>${cfg.title}</h1>
            <p>${cfg.desc}</p>
          </div>
          <div class="hero-art" aria-hidden="true"></div>
        </section>
        ${
          cards
            ? `<h2 class="section-title">Available Reports</h2><div class="cards">${cards}</div>`
            : ""
        }
        <div class="info-bar">
          <div class="i">i</div>
          <div>New reports and enhancements will be added as part of QA validation and release cycle.</div>
        </div>
      `;

      main.querySelectorAll("[data-open]").forEach((btn) => {
        btn.addEventListener("click", () => renderPage(btn.getAttribute("data-open")));
      });
    }

    document.querySelectorAll("[data-toggle]").forEach((btn) => {
      btn.addEventListener("click", () => {
        const key = btn.getAttribute("data-toggle");
        const group = document.getElementById(`group-${key}`);
        const open = !group.classList.contains("hidden");
        group.classList.toggle("hidden", open);
        btn.classList.toggle("open", !open);
      });
    });

    document.querySelectorAll("[data-page]").forEach((btn) => {
      btn.addEventListener("click", () => renderPage(btn.getAttribute("data-page")));
    });

    const start = (location.hash || "#pf-reports").slice(1);
    renderPage(PAGES[start] ? start : "pf-reports");
  </script>
</body>
</html>
